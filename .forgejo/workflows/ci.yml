name: Build & Lint

on: [push]

jobs:
  lint-and-build:
    runs-on: self-hosted
    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest@sha256:5d6a17640b25694988b9db5a4145537b9918e5430116b2cf90d84e837609b382

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: https://github.com/cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31

      - name: Setup Attic
        id: attic
        run: |
          nix profile add "nixpkgs#attic-client"
          attic login main https://attic.kybe.xyz/main ${{ secrets.ATTIC_KEY }}
          attic use main

      - name: Build & Checks
        run: |
          nix flake check . -L --no-update-lock-file --accept-flake-config

      - name: Push to Attic
        if: ${{ steps.attic.conclusion == 'success' }}
        run: attic push main --ignore-upstream-cache-filter -j 64 $(ls -d /nix/store/*/)
